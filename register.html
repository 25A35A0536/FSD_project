<!DOCTYPE html>
<html>
<head>

<title>Register - Organic & Natural Grocery Store</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
width:350px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#0aa14b;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#000;
}

a{
text-decoration:none;
color:#0aa14b;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form action="login.html">

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email" required>

<input type="password" placeholder="Password" required>

<input type="password" placeholder="Confirm Password" required>

<button type="submit">Register</button>

</form>

<p>Already have an account?</p>

<a href="login.html">Login Here</a>

</div>

</body>
</html>
